<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0ede6;--bg2:#e8e3d8;--bg3:#ddd8cc;
  --card:#faf8f4;--border:#d4cfc4;--border2:#c4bfb2;
  --text:#4b3832;--t2:#7a6a60;--t3:#a89888;
  --gd:#c0392b;--g:#e74c3c;--gl:#fdecea;--gm:#e8937a;
  --red:#c0392b;--rl:#fdecea;
  --amb:#7b6341;--al:#f2ece0;
  --blu:#4a6278;--bl:#e4ecf2;
  --r:16px;--rs:10px;
  --brown:#4b3832;--cream:#faf8f4;--orange:#e8560a;
}
html,body{background:var(--bg);font-family:"Noto Sans TC",sans-serif;color:var(--text);font-size:15px;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh}
/* Header */
.hdr{padding:48px 16px 10px;background:var(--card);border-bottom:1px solid var(--border)}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:20px;font-weight:600;color:var(--brown)}
.hdr-sub{font-size:12px;color:var(--t3);margin-top:2px}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.dot.ok{background:var(--g)}.dot.err{background:var(--red)}
/* Nav */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 4px}
.nav::-webkit-scrollbar{display:none}
.nav button{flex-shrink:0;padding:11px 14px;border:none;background:none;color:var(--t3);font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-weight:400;transition:all 0.15s}
.nav button.on{color:var(--gd);border-bottom-color:var(--gd);font-weight:500}
/* Tabs */
.tab{display:none;padding:14px 14px 80px}.tab.on{display:block}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stitle{font-size:11px;font-weight:500;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3)}
.row:last-child{border-bottom:none}
.rl{font-size:14px;color:var(--t2)}.rv{font-size:14px;font-weight:500}
.trow{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px;border-top:1px solid var(--border2)}
.tlbl{font-size:14px;font-weight:500;color:var(--t2)}.tval{font-size:16px;font-weight:600}
/* Colors */
.ci{color:var(--gd)}.ce{color:var(--red)}.ca{color:var(--amb)}
/* Stats */
.sgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.sl{font-size:11px;color:var(--t3);margin-bottom:4px}.sv{font-size:18px;font-weight:600}
/* Inputs */
.inp{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--gm)}
select.inp{appearance:auto;-webkit-appearance:auto}
.frow{display:grid;gap:7px;margin-bottom:7px}
.c1{grid-template-columns:1fr}.c2{grid-template-columns:1fr 1fr}
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;width:100%;font-weight:400;transition:all 0.15s}
.btn.primary{background:var(--gd);color:#fff;border-color:var(--gd);font-weight:500}
.btn.sm{width:auto;padding:6px 12px;font-size:13px}
/* Who buttons */
.who-btns{display:flex;gap:6px;margin-bottom:7px}
.who-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:13px;font-family:inherit;cursor:pointer;text-align:center;transition:all 0.15s}
.who-btn.on{border-color:var(--gd);background:var(--gl);color:var(--gd);font-weight:500}
/* Sticky input */
.sinput{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:12px}
/* Items */
.item{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--bg3)}
.item:last-child{border-bottom:none}
.il{flex:1;min-width:0}.iname{font-size:14px;font-weight:500}.imeta{font-size:12px;color:var(--t3);margin-top:2px}
.ir{text-align:right;flex-shrink:0;margin-left:10px}.iamt{font-size:14px;font-weight:600}
.ibtn-row{display:flex;gap:6px;justify-content:flex-end;margin-top:3px}
.del{color:#b8b8b0;background:none;border:none;cursor:pointer;padding:2px;line-height:1}
.del:active{color:var(--red)}
/* Badge */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500;vertical-align:middle}
.bg{background:var(--gl);color:var(--gd)}.br{background:var(--rl);color:var(--red)}
.ba{background:var(--al);color:var(--amb)}.bb{background:var(--bl);color:var(--blu)}
/* Summary bar */
.sbar{height:6px;border-radius:3px;background:var(--bg3);margin-top:4px;overflow:hidden}
.sfill{height:100%;border-radius:3px;background:var(--g)}
/* Month nav */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
.mnav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:16px;color:var(--t2)}
.mnav-lbl{font-size:14px;font-weight:500;color:var(--t2)}
/* Progress */
.prog-wrap{position:relative;margin:10px 0 6px}
.prog-track{height:10px;background:var(--bg3);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#c0392b,#e8560a,#c0392b);background-size:200% 100%;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);animation:shimmer 3s infinite linear}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes breathe{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.prog-labels{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.prog-main{font-size:20px;font-weight:600;color:var(--gd)}
.prog-pct{font-size:14px;font-weight:500;color:var(--g)}
.prog-hint{font-size:12px;color:var(--t3);margin-top:5px}
/* Chart */
.chart-wrap{position:relative;height:140px;margin-top:8px}
/* Toast */
.pill{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.pill.on{background:var(--gd);color:#fff;border-color:var(--gd)}
#cat-pills::-webkit-scrollbar{display:none}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">Cody ＆ Ollie</div>
      <div class="hdr-sub">一起加油買大狗窩!!!</div>
    </div>
    <div class="dot" id="sync"></div>
  </div>
</div>

<div class="nav">
  <button class="on" onclick="go('daily',this)">日常開銷</button>
  <button onclick="go('overview',this)">總覽</button>
  <button onclick="go('fixed',this)">固定支出</button>
  <button onclick="go('appliance',this)">大型家電</button>
  <button onclick="go('costco',this)">Costco</button>
  <button onclick="go('feedback',this)">意見箱</button>
</div>

<!-- 日常開銷 -->
<div id="tab-daily" class="tab on">
  <div class="sinput">
    <div class="frow c2" style="margin-bottom:7px">
      <input class="inp" type="date" id="d-date" onchange="renderDaily()">
      <select class="inp" id="d-cat">
        <option>餐飲</option><option>日用品</option><option>娛樂</option>
        <option>交通</option><option>美妝保養</option><option>醫療健康</option>
        <option>衣物</option><option>寵物</option><option>送禮</option><option>其他</option>
      </select>
    </div>
    <div class="frow c1" style="margin-bottom:7px">
      <input class="inp" type="number" id="d-amount" placeholder="金額" inputmode="numeric" min="0">
    </div>
    <div class="frow c2" style="margin-bottom:7px">
      <input class="inp" type="text" id="d-item" placeholder="品項名稱（選填）" oninput="autoDetectCat(this.value)">
      <input class="inp" type="text" id="d-note" placeholder="備註（選填）">
    </div>
    <div class="who-btns">
      <button class="who-btn" id="wb-ollie" onclick="setWho('Ollie')">Ollie</button>
      <button class="who-btn" id="wb-cody" onclick="setWho('Cody')">Cody</button>
      <button class="who-btn on" id="wb-both" onclick="setWho('')">兩人</button>
    </div>
    <button class="btn primary" onclick="addDaily()">新增開銷</button>
  </div>
  <input class="inp" id="d-search" placeholder="🔍 搜尋品項、分類、備註..." oninput="clearCatFilter();renderDaily()" style="margin-bottom:8px">
  <div id="cat-pills" style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px;-webkit-overflow-scrolling:touch">
    <button class="pill on" onclick="setCatFilter('')" id="pill-all">全部</button>
    <button class="pill" onclick="setCatFilter('餐飲')" id="pill-餐飲">餐飲</button>
    <button class="pill" onclick="setCatFilter('日用品')" id="pill-日用品">日用品</button>
    <button class="pill" onclick="setCatFilter('娛樂')" id="pill-娛樂">娛樂</button>
    <button class="pill" onclick="setCatFilter('交通')" id="pill-交通">交通</button>
    <button class="pill" onclick="setCatFilter('美妝保養')" id="pill-美妝保養">美妝保養</button>
    <button class="pill" onclick="setCatFilter('醫療健康')" id="pill-醫療健康">醫療健康</button>
    <button class="pill" onclick="setCatFilter('衣物')" id="pill-衣物">衣物</button>
    <button class="pill" onclick="setCatFilter('寵物')" id="pill-寵物">寵物</button>
    <button class="pill" onclick="setCatFilter('送禮')" id="pill-送禮">送禮</button>
    <button class="pill" onclick="setCatFilter('其他')" id="pill-其他">其他</button>
  </div>
  <div class="mnav">
    <button class="mnav-btn" onclick="changeDMonth(-1)">‹</button>
    <span class="mnav-lbl" id="d-month-lbl"></span>
    <button class="mnav-btn" onclick="changeDMonth(1)" id="d-next-btn">›</button>
  </div>
  <div class="card">
    <div id="d-list"><div style="font-size:13px;color:var(--t3);padding:4px 0">本月尚無紀錄</div></div>
    <div class="trow">
      <span class="tlbl" id="d-total-lbl">本月日常開銷</span>
      <span class="tval ce" id="d-total">$0</span>
    </div>
  </div>
</div>

<!-- 總覽 -->
<div id="tab-overview" class="tab">
  <!-- 大狗窩進度 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:15px;font-weight:600;color:var(--gd)">大狗窩目標進度 🐾</div>
      <button onclick="toggleSavings()" style="background:none;border:none;cursor:pointer;color:var(--t3);padding:4px;line-height:1;border-radius:6px">
        <svg id="eye-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>

    <!-- 存款 & 目標 (隱藏狀態) -->
    <div id="savings-row" style="display:none;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:var(--t3)">存款</span>
        <input class="inp" type="number" id="ov-savings" placeholder="輸入金額" inputmode="numeric"
          onchange="saveSavings(this.value)"
          style="width:120px;font-size:13px;font-weight:600;color:var(--gd);text-align:right;padding:5px 8px">
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:var(--t3)">目標</span>
        <input class="inp" type="number" id="ov-goal" value="" inputmode="numeric"
          onchange="saveGoal(this.value)"
          style="width:120px;font-size:13px;font-weight:600;color:var(--gd);text-align:right;padding:5px 8px">
      </div>
    </div>

    <!-- 進度顯示 (隱藏狀態) -->
    <div id="savings-display" style="display:none;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span id="ov-savamt" style="font-size:22px;font-weight:600;color:var(--gd)">$0</span>
      <span id="ov-pct" style="font-size:14px;font-weight:500;color:var(--g)">0%</span>
    </div>

    <!-- 進度條 (永遠顯示，但隱藏時變灰) -->
    <div class="prog-track" style="margin-bottom:4px">
      <div class="prog-fill" id="ov-bar" style="width:0%"></div>
    </div>

    <!-- 里程碑 -->
    <div style="position:relative;height:38px" id="milestone-wrap"></div>

    <!-- 提示 (隱藏狀態) -->
    <div id="ov-hint-row" style="display:none">
      <div class="prog-hint" id="ov-hint">還差 $8,000,000</div>
    </div>
  </div>
  <!-- 月份切換 -->
  <div class="mnav">
    <button class="mnav-btn" onclick="changeOvMonth(-1)">‹</button>
    <span class="mnav-lbl" id="ov-month-lbl"></span>
    <button class="mnav-btn" onclick="changeOvMonth(1)" id="ov-next-btn">›</button>
  </div>
  <!-- 本月支出 -->
  <div class="sgrid">
    <div class="stat"><div class="sl" id="ov-exp-lbl">本月支出</div><div class="sv ce" id="ov-exp">$0</div></div>
  </div>
  <!-- 本月明細 -->
  <div class="card">
    <div class="stitle">支出明細</div>
    <div class="row"><span class="rl">固定支出</span><span class="rv ce" id="ov-fixed">$0</span></div>
    <div class="row"><span class="rl">日常開銷</span><span class="rv ce" id="ov-daily">$0</span></div>
  </div>
  <!-- 開銷分類 -->
  <div class="card" id="ov-cat-card" style="display:none">
    <div class="stitle">開銷分類</div>
    <div id="ov-cat-list"></div>
  </div>
  <!-- 折線圖 -->
  <div class="card" id="ov-chart-card">
    <div class="stitle">過去6個月支出趨勢</div>
    <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
  </div>
</div>

<!-- 固定支出 -->
<div id="tab-fixed" class="tab">
  <div class="card">
    <div class="stitle">固定項目</div>
    <div class="frow c2" style="margin-bottom:7px">
      <input class="inp" type="text" id="fx-name" placeholder="項目名稱">
      <input class="inp" type="number" id="fx-amount" placeholder="金額" inputmode="numeric">
    </div>
    <button class="btn primary" onclick="addFixed()">新增</button>
    <div id="fixed-extra-list" style="margin-top:10px"></div>
    <div class="trow" id="fixed-extra-trow" style="display:none">
      <span class="tlbl">固定合計</span>
      <span class="tval ce" id="fixed-extra-total">$0</span>
    </div>
  </div>
  <div class="card">
    <div class="stitle">年度費用</div>
    <div class="frow c2" style="margin:0 0 7px">
      <input class="inp" type="text" id="an-name" placeholder="年度項目名稱">
      <input class="inp" type="number" id="an-amount" placeholder="金額" inputmode="numeric">
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);margin-bottom:8px;cursor:pointer">
      <input type="checkbox" id="an-spread" style="width:16px;height:16px">
      均攤到每月固定支出
    </label>
    <button class="btn primary" onclick="addAnnual()">新增年度費用</button>
    <div id="annual-list" style="margin-top:10px"></div>
    <div class="trow">
      <span class="tlbl">年度合計</span>
      <span class="tval ce" id="annual-total">$0</span>
    </div>
  </div>
</div>

<!-- 大型家電 -->
<div id="tab-appliance" class="tab">
  <input class="inp" id="ap-search" placeholder="🔍 搜尋品項、備註..." oninput="renderAppliances()" style="margin-bottom:8px">
  <div class="card">
    <div class="frow c2" style="margin-bottom:7px">
      <input class="inp" type="text" id="ap-name" placeholder="品項名稱">
      <input class="inp" type="number" id="ap-amount" placeholder="金額" inputmode="numeric">
    </div>
    <div class="frow c2" style="margin-bottom:7px">
      <input class="inp" type="date" id="ap-date">
      <input class="inp" type="text" id="ap-note" placeholder="購買地點／備註">
    </div>
    <button class="btn primary" onclick="addAppliance()">新增家電</button>
    <div id="ap-list" style="margin-top:10px"></div>
    <div class="trow">
      <span class="tlbl">大型家電總計</span>
      <span class="tval ce" id="ap-total">$0</span>
    </div>
  </div>
</div>


<!-- Costco -->
<div id="tab-costco" class="tab">
  <div class="sinput">
    <div class="frow c2" style="margin-bottom:7px">
      <input class="inp" type="date" id="cc-date">
      <input class="inp" type="text" id="cc-name" placeholder="品項名稱">
    </div>
    <div class="frow c1" style="margin-bottom:7px">
      <input class="inp" type="number" id="cc-price" placeholder="價格" inputmode="numeric">
    </div>
    <button class="btn primary" onclick="addCostcoItem()">新增品項</button>
  </div>
  <input class="inp" id="cc-search" placeholder="🔍 搜尋品項..." oninput="renderCostco()" style="margin-bottom:8px">
  <div class="card">
    <div id="cc-list"><div style="font-size:13px;color:var(--t3);padding:4px 0">尚無紀錄</div></div>
    <div class="trow" id="cc-trow" style="display:none">
      <span class="tlbl">Costco 總計</span>
      <span class="tval ce" id="cc-total">$0</span>
    </div>
  </div>
</div>

<!-- 意見箱 -->
<div id="tab-feedback" class="tab">
  <div class="card">
    <div style="font-size:15px;font-weight:600;color:var(--gd);margin-bottom:4px">C & O 修改意見 💬</div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:10px">記錄想要修改的功能或建議</div>
    <textarea class="inp" id="fb-text" placeholder="輸入意見或留言..." style="height:70px;resize:none;margin-bottom:8px"></textarea>
    <button class="btn primary" onclick="addFeedback()">送出留言</button>
    <div id="fb-list" style="margin-top:10px"></div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:"https://cody-ollie-default-rtdb.asia-southeast1.firebasedatabase.app"});
const ref=firebase.database().ref('data');

const TRASH='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
const SYNC='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>';
const PENCIL='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

const KEYWORD_CAT = {

  交通: ['油錢','停車','加油','捷運','公車','計程車','uber','taxi','高鐵','火車','機票','過路費','ETC'],
  日用品: ['衛生紙','洗碗','洗衣','清潔','沐浴','洗髮','牙膏','牙刷','面紙','垃圾袋','保鮮膜'],
  寵物: ['貓','狗','罐罐','飼料','貓砂','寵物','獸醫','疫苗','玩具'],
  美妝保養: ['保養','面膜','化妝','精華','乳液','口紅','粉底','香水','美容'],

// ── Firebase ──
ref.on('value',snap=>{
  const val=snap.val();
  if(val){
    D=Object.assign({},D,val);
    ['fixed_extra','annual_extra','feedback'].forEach(k=>{
      if(D[k]&&!Array.isArray(D[k]))D[k]=Object.values(D[k]);
    });
    if(!Array.isArray(D.appliances)||D.appliances.length===0)D.appliances=[...DEFAULT_APPLIANCES];
    else if(!Array.isArray(D.appliances))D.appliances=Object.values(D.appliances);
    if(!D.daily)D.daily={};
    if(D.costco&&!Array.isArray(D.costco))D.costco=Object.values(D.costco);
    Object.keys(D.daily).forEach(m=>{
      if(D.daily[m]&&!Array.isArray(D.daily[m]))D.daily[m]=Object.values(D.daily[m]);
    });
  }
  setSyncDot('ok');
  if(firstLoad){
    firstLoad=false;
    initAll();
    renderAll();
  } else {
    renderAll();
    if(!saving)showToast('資料已同步');
  }
  saving=false;
},()=>setSyncDot('err'));

function save(){saving=true;setSyncDot('');ref.set(D).then(()=>setSyncDot('ok')).catch(()=>{setSyncDot('err');showToast('同步失敗');});}

// ── Helpers ──
function fmt(n){return '$'+Math.round(n).toLocaleString('zh-TW');}
function today(){return new Date().toISOString().split('T')[0];}
function curMonth(){const n=new Date();return n.getFullYear()+'-'+(n.getMonth()+1).toString().padStart(2,'0');}
function nowStr(){const n=new Date();return n.getFullYear()+'/'+(n.getMonth()+1).toString().padStart(2,'0')+'/'+n.getDate().toString().padStart(2,'0')+' '+n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function setSyncDot(s){const d=document.getElementById('sync');if(d)d.className='dot'+(s==='ok'?' ok':s==='err'?' err':'');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function go(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+id).classList.add('on');
  btn.classList.add('on');
}

function initAll(){
  const td=today();
  const el=document.getElementById('d-date');if(el&&!el.value)el.value=td;
  const ap=document.getElementById('ap-date');if(ap&&!ap.value)ap.value=td;
  const gi=document.getElementById('ov-goal');if(gi&&D.goal)gi.value=D.goal;
  const si=document.getElementById('ov-savings');if(si&&D.savings_amount)si.value=D.savings_amount;
  dMonth=curMonth();ovMonth=curMonth();
  updateMonthUI('d',dMonth);
  updateMonthUI('ov',ovMonth);
}

function updateMonthUI(prefix,m){
  const [y,mo]=m.split('-').map(Number);
  const cur=curMonth();
  const lbl=document.getElementById(prefix+'-month-lbl');
  if(lbl)lbl.textContent=y+'年'+mo+'月';
  const nb=document.getElementById(prefix+'-next-btn');
  if(nb)nb.style.opacity=m>=cur?'0.3':'1';
  if(prefix==='d'){
    const tl=document.getElementById('d-total-lbl');
    if(tl)tl.textContent=m===cur?'本月日常開銷':y+'年'+mo+'月開銷';
  }
  if(prefix==='ov'){
    const el=document.getElementById('ov-exp-lbl');
    if(el)el.textContent=m===cur?'本月支出':y+'年'+mo+'月支出';
  }
}

function changeDMonth(dir){
  const [y,m]=dMonth.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  dMonth=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
  if(dMonth>curMonth())dMonth=curMonth();
  updateMonthUI('d',dMonth);renderDaily();
}
function changeOvMonth(dir){
  const [y,m]=ovMonth.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  ovMonth=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
  if(ovMonth>curMonth())ovMonth=curMonth();
  updateMonthUI('ov',ovMonth);updateOverview();
}

function autoDetectCat(val){
  if(!val) return;
  const v = val.toLowerCase();
  for(const [cat, keywords] of Object.entries(KEYWORD_CAT)){
    if(keywords.some(k => v.includes(k))){
      const sel = document.getElementById('d-cat');
      if(sel) sel.value = cat;
      return;
    }
  }
}

// ── 日常開銷 ──
function addDaily(){
  const amount=parseFloat(document.getElementById('d-amount').value);
  if(!amount||amount<=0){showToast('請輸入金額');return;}
  const cat=document.getElementById('d-cat').value;
  const item=document.getElementById('d-item').value;
  const note=document.getElementById('d-note').value;
  const who=selectedWho;
  const date=document.getElementById('d-date').value||today();
  const m=date.substring(0,7);
  if(!D.daily[m])D.daily[m]=[];
  D.daily[m].push({cat,amount,item,note,who,date,id:Date.now()});
  document.getElementById('d-amount').value='';
  document.getElementById('d-item').value='';
  document.getElementById('d-note').value='';
  document.getElementById('d-date').value=today();
  dMonth=m;updateMonthUI('d',dMonth);
  save();renderDaily();updateOverview();showToast('已新增');
  setTimeout(()=>{const el=document.getElementById('d-amount');if(el)el.focus();},100);
}

function renderDaily(){
  const m=dMonth||curMonth();
  const raw=(D.daily&&D.daily[m])||[];
  const q=(document.getElementById('d-search')?.value||'').toLowerCase();
  const items=raw.filter(it=>{
    const matchQ=!q||[it.item,it.cat,it.note,it.who].filter(Boolean).join(' ').toLowerCase().includes(q);
    const matchCat=!catFilter||it.cat===catFilter;
    return matchQ&&matchCat;
  });
  const sorted=[...items].sort((a,b)=>b.date>a.date?1:-1);
  const list=document.getElementById('d-list');
  if(!list)return;
  list.innerHTML=sorted.length?sorted.map(it=>`
    <div class="item" id="di-${it.id}">
      <div class="il">
        <div class="iname">${it.item?it.item+' ':''}<span class="badge ${CAT_CLS[it.cat]||'ba'}">${it.cat}</span>${it.who?` <span style="font-size:11px;color:var(--t3)">${it.who}</span>`:''}</div>
        <div class="imeta">${[it.date,it.note].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="ir">
        <div class="iamt ce">${fmt(it.amount)}</div>
        <div class="ibtn-row">
          <button class="del" onclick="editDaily(${it.id})" style="color:#b8b8b0">${PENCIL}</button>
          <button class="del" onclick="delDaily(${it.id})">${TRASH}</button>
        </div>
      </div>
    </div>`).join(''):'<div style="font-size:13px;color:var(--t3);padding:4px 0">本月尚無紀錄</div>';
  document.getElementById('d-total').textContent=fmt(raw.reduce((s,i)=>s+i.amount,0));
  updateOverview();
}

function delDaily(id){
  Object.keys(D.daily||{}).forEach(m=>{D.daily[m]=(D.daily[m]||[]).filter(i=>i.id!==id);});
  save();renderDaily();
}

function editDaily(id){
  let found=null;
  Object.keys(D.daily||{}).forEach(m=>{const it=(D.daily[m]||[]).find(i=>i.id===id);if(it)found=it;});
  if(!found)return;
  const ex=document.getElementById('edi-'+id);if(ex){ex.remove();return;}
  const cats=['餐飲','日用品','娛樂','交通','美妝保養','醫療健康','衣物','寵物','送禮','其他'];
  const opts=cats.map(c=>`<option${c===found.cat?' selected':''}>${c}</option>`).join('');
  const div=document.createElement('div');
  div.id='edi-'+id;
  div.style.cssText='background:var(--bg2);border-radius:8px;padding:10px;margin:6px 0;border:1px solid var(--border)';
  div.innerHTML=`
    <div class="frow c2" style="margin-bottom:7px">
      <select class="inp" id="ec-cat-${id}">${opts}</select>
      <input class="inp" type="number" id="ec-amt-${id}" value="${found.amount}" inputmode="numeric" style="text-align:right">

      <button class="btn primary" onclick="saveEditDaily(${id})">儲存</button>
      <button class="btn" onclick="document.getElementById('edi-${id}').remove()">取消</button>
    </div>`;
  const el=document.getElementById('di-'+id);if(el)el.after(div);

function saveEditDaily(id){
  Object.keys(D.daily||{}).forEach(m=>{
    const it=(D.daily[m]||[]).find(i=>i.id===id);
    if(!it)return;
    const c=document.getElementById('ec-cat-'+id);if(c)it.cat=c.value;
    const a=document.getElementById('ec-amt-'+id);if(a){const v=parseFloat(a.value);if(v>0)it.amount=v;}

      <div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">
        <button onclick="toggleDone(${it.id})"

          ${it.done?'✓':''}
        </button>
        <div class="il">
          <div class="iname" style="font-weight:400;${it.done?'text-decoration:line-through;color:var(--t3)':''}">${it.text}</div>
          <div class="imeta">${it.time}${it.done?' · 已完成 '+it.doneAt:''}</div>

function toggleDone(id){
  const it=(D.feedback||[]).find(i=>i.id===id);if(!it)return;
  it.done=!it.done;it.doneAt=it.done?nowStr():'';
  save();renderFeedback();
}
function delFeedback(id){D.feedback=(D.feedback||[]).filter(i=>i.id!==id);save();renderFeedback();}

function renderMilestones(target, savings=0){
  const wrap = document.getElementById('milestone-wrap');
  if(!wrap) return;
  const milestones = [
    {amount: 1000000, label: '100萬'},
    {amount: 2000000, label: '裝潢款'},
    {amount: 4000000, label: '家具款'},
    {amount: 6000000, label: '頭期款'},
    {amount: 8000000, label: '大狗窩'},
  ];
  wrap.innerHTML = milestones.map(m => {
    const pct = Math.min(100, Math.round(m.amount / target * 100));
    return `<div style="position:absolute;left:${pct}%;transform:translateX(-50%);text-align:center;top:0">
      <div style="width:2px;height:10px;background:var(--border2);margin:0 auto"></div>
      <div style="font-size:9px;color:var(--t3);white-space:nowrap;margin-top:1px;line-height:1.2">${m.label}</div>

function saveGoal(val){const v=parseFloat(val);if(!v||v<=0)return;D.goal=v;save();updateOverview();showToast('目標已更新');}

// ── 總覽 ──
function updateOverview(){
  const target=Number(D.goal)||8000000;
  const savings=Number(D.savings_amount)||0;
  const pct=Math.min(100,Math.round(savings/target*100));
  const diff=target-savings;
  const sa=document.getElementById('ov-savamt');if(sa)sa.textContent=fmt(savings);
  const pe=document.getElementById('ov-pct');if(pe)pe.textContent=pct+'%';
  const bar=document.getElementById('ov-bar');if(bar)bar.style.width=pct+'%';
  const hi=document.getElementById('ov-hint');if(hi)hi.textContent=diff>0?'還差 '+fmt(diff):'🎉 已達成目標！';
  renderMilestones(target, savings);

  const m=ovMonth||curMonth();
  const dailyItems=(D.daily&&D.daily[m])||[];
  const dailyTotal=dailyItems.reduce((s,i)=>s+i.amount,0);
  const fixedTotal=(D.fixed_extra||[]).reduce((s,i)=>s+i.amount,0);
  const totalExp=fixedTotal+dailyTotal;

  const ex=document.getElementById('ov-exp');if(ex)ex.textContent=fmt(totalExp);
  const fi=document.getElementById('ov-fixed');if(fi)fi.textContent=fmt(fixedTotal);
  const di=document.getElementById('ov-daily');if(di)di.textContent=fmt(dailyTotal);

  // 分類
  const cats={};
  dailyItems.forEach(i=>{cats[i.cat]=(cats[i.cat]||0)+i.amount;});
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const cc=document.getElementById('ov-cat-card');
  const cl=document.getElementById('ov-cat-list');
  if(sorted.length&&cc&&cl){
    cc.style.display='block';
    cl.innerHTML=sorted.map(([cat,amt])=>{
      const p=Math.round(amt/dailyTotal*100);
      return `<div style="margin-bottom:9px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
          <span class="badge ${CAT_CLS[cat]||'ba'}">${cat}</span>
          <span style="font-weight:500">${fmt(amt)} <span style="color:var(--t3);font-weight:400">${p}%</span></span>
        </div>
        <div class="sbar"><div class="sfill" style="width:${p}%"></div></div>
      </div>`;
    }).join('');
  } else if(cc){cc.style.display='none';}

  renderTrendChart();
}

// ── 折線圖 ──
function renderTrendChart(){
  const canvas=document.getElementById('trend-chart');
  if(!canvas)return;
  const now=new Date();
  const labels=[],data=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const m=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
    const mo=d.getMonth()+1;
    labels.push(d.getFullYear()%100+'/'+(mo<10?'0'+mo:mo));
    const daily=(D.daily&&D.daily[m])||[];
    const dt=daily.reduce((s,i)=>s+i.amount,0);
    const ft=(D.fixed_extra||[]).reduce((s,i)=>s+i.amount,0);
    data.push(dt+ft);
  }
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(canvas,{
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'每月支出',
        data,
        borderColor:'#5c7a5f',
        backgroundColor:'rgba(92,122,95,0.1)',
        borderWidth:2,
        pointBackgroundColor:'#5c7a5f',
        pointRadius:4,
        tension:0.3,
        fill:true
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:11},color:'#9a9890'}},
        y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#9a9890',callback:v=>'$'+v.toLocaleString()}}
      }
    }
  });
}

function renderAll(){
  renderDaily();
  renderFixed();
  renderAnnual();
  renderAppliances();
  renderFeedback();
  renderCostco();
  updateOverview();
}

let scannedItems = [];

async function scanReceipt(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('scan-status');
  status.textContent = '⏳ 辨識中，請稍候...';

  const VKEY = 'AIzaSyDlB0pcaByLRO30n6ctGkDFpi7xiYgeFJY';

  // Resize image to reduce payload size
  const resized = await resizeImage(file, 1200);

  try {
    const resp = await fetch(
      `https://vision.googleapis.com/v1/images:annotate?key=${VKEY}`,
      {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          requests: [{
            image: {content: resized},
            features: [{type: 'TEXT_DETECTION'}]
          }]
        })
      }
    );
    const data = await resp.json();
    if (!resp.ok) {
      status.textContent = '❌ API錯誤 ' + resp.status + '：' + (data.error?.message || '未知錯誤');
      return;
    }
    const text = data.responses?.[0]?.fullTextAnnotation?.text ||
                 data.responses?.[0]?.textAnnotations?.[0]?.description || '';
    if (!text) { status.textContent = '❌ 無法辨識文字，請確認照片清晰'; return; }
    parseReceipt(text);
    status.textContent = '✅ 辨識完成！';
  } catch(e) {
    console.error(e);
    status.textContent = '❌ 失敗：' + e.message;
  }
  input.value = '';
}

async function resizeImage(file, maxSize) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = h * maxSize / w; w = maxSize; }
        else { w = w * maxSize / h; h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.src = url;
  });
}











// ── Costco ──
function addCostcoItem(){
  const date=document.getElementById('cc-date').value||today();
  const name=document.getElementById('cc-name').value.trim();
  const price=parseFloat(document.getElementById('cc-price').value);
  if(!name||!price){showToast('請填入品項和價格');return;}
  if(!D.costco)D.costco=[];
  D.costco.push({date,name,price,id:Date.now()});
  document.getElementById('cc-name').value='';
  document.getElementById('cc-price').value='';
  document.getElementById('cc-date').value=today();
  save();renderCostco();showToast('已新增');
  setTimeout(()=>{const el=document.getElementById('cc-name');if(el)el.focus();},100);
}

function renderCostco(){
  const q=(document.getElementById('cc-search')?.value||'').toLowerCase();
  const all=D.costco||[];
  const filtered=q?all.filter(it=>it.name.toLowerCase().includes(q)):all;
  const sorted=[...filtered].sort((a,b)=>b.date>a.date?1:-1);
  const list=document.getElementById('cc-list');
  if(!list)return;
  // Build price history map for comparison
  const priceMap = {};
  const sortedAll = [...(D.costco||[])].sort((a,b)=>a.date>b.date?1:-1);
  sortedAll.forEach(it=>{
    if(!priceMap[it.name]) priceMap[it.name]=[];
    priceMap[it.name].push({date:it.date, price:it.price});
  });

  list.innerHTML=sorted.length?sorted.map(it=>{
    const history = priceMap[it.name]||[];
    const idx = history.findIndex(h=>h.date===it.date&&h.price===it.price);
    const prev = idx > 0 ? history[idx-1] : null;
    let diffTag = '';
    if(prev){
      const diff = it.price - prev.price;
      if(diff > 0) diffTag = `<span style="font-size:10px;color:var(--red);margin-left:3px">↑${diff}</span>`;
      else if(diff < 0) diffTag = `<span style="font-size:10px;color:var(--gd);margin-left:3px">↓${Math.abs(diff)}</span>`;
      else diffTag = `<span style="font-size:10px;color:var(--t3);margin-left:3px">—</span>`;
    }
    return `
    <div class="item" id="cci-${it.id}">
      <div class="il">
        <div class="iname">${it.name}</div>
        <div class="imeta">${it.date}${prev?' · 上次 '+fmt(prev.price):''}</div>
      </div>
      <div class="ir">
        <div class="iamt ce">${fmt(it.price)}${diffTag}</div>
        <div class="ibtn-row">
          <button class="del" onclick="syncCostcoToDaily(${it.id})" style="color:#b8b8b0" title="轉入日常開銷">${SYNC}</button>
          <button class="del" onclick="editCostcoItem(${it.id})" style="color:#b8b8b0">${PENCIL}</button>
          <button class="del" onclick="delCostcoItem(${it.id})">${TRASH}</button>
        </div>
      </div>
    </div>`;
  }).join(''):'<div style="font-size:13px;color:var(--t3);padding:4px 0">尚無紀錄</div>';
  const trow=document.getElementById('cc-trow');
  if(trow)trow.style.display=all.length?'flex':'none';
  const tel=document.getElementById('cc-total');
  if(tel)tel.textContent=fmt(all.reduce((s,i)=>s+i.price,0));
}


function syncCostcoToDaily(id){
  const it=(D.costco||[]).find(i=>i.id===id);
  if(!it)return;
  // Switch to daily tab
  const btn=document.querySelector('.nav button');
  go('daily',btn);
  // Fill in the form
  const amtEl=document.getElementById('d-amount');
  const itemEl=document.getElementById('d-item');
  const dateEl=document.getElementById('d-date');
  const catEl=document.getElementById('d-cat');
  if(amtEl)amtEl.value=it.price;
  if(itemEl)itemEl.value='Costco - '+it.name;
  if(dateEl)dateEl.value=it.date;
  if(catEl)catEl.value='日用品';
  showToast('已帶入日常開銷，請確認後新增');
  setTimeout(()=>{if(amtEl)amtEl.focus();},300);
}

function delCostcoItem(id){
  D.costco=(D.costco||[]).filter(i=>i.id!==id);
  save();renderCostco();
}

function editCostcoItem(id){
  const it=(D.costco||[]).find(i=>i.id===id);if(!it)return;
  const ex=document.getElementById('ecc-'+id);if(ex){ex.remove();return;}
  const div=document.createElement('div');div.id='ecc-'+id;
  div.style.cssText='background:var(--bg2);border-radius:8px;padding:10px;margin:6px 0;border:1px solid var(--border)';
  div.innerHTML=`
    <div class="frow c2" style="margin-bottom:7px">
      <input class="inp" type="text" id="ecc-n-${id}" value="${it.name}">
      <input class="inp" type="number" id="ecc-p-${id}" value="${it.price}" inputmode="numeric" style="text-align:right">
    </div>
    <div class="frow c1" style="margin-bottom:7px">
      <input class="inp" type="date" id="ecc-d-${id}" value="${it.date}">
    </div>
    <div class="frow c2">
      <button class="btn primary" onclick="saveEditCostco(${id})">儲存</button>
      <button class="btn" onclick="document.getElementById('ecc-${id}').remove()">取消</button>
    </div>`;
  const el=document.getElementById('cci-'+id);if(el)el.after(div);
}

function saveEditCostco(id){
  const it=(D.costco||[]).find(i=>i.id===id);if(!it)return;
  const n=document.getElementById('ecc-n-'+id);if(n&&n.value.trim())it.name=n.value.trim();
  const p=document.getElementById('ecc-p-'+id);if(p){const v=parseFloat(p.value);if(v>0)it.price=v;}
  const d=document.getElementById('ecc-d-'+id);if(d&&d.value)it.date=d.value;
  const r=document.getElementById('ecc-'+id);if(r)r.remove();
  save();renderCostco();showToast('已修改');
}
